<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hayabo - 管理者パネル</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        /* 既存のスタイルを維持しつつ、参加者用ボタンのスタイルを追加 */
        :root { --primary-color: #000000; --text-light: #666666; }
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .logo { font-family: 'serif'; font-size: 24px; margin-bottom: 20px; border-bottom: 2px solid #000; padding-bottom: 10px; }
        
        .control-group { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #eee; }
        .btn { padding: 12px 20px; font-size: 16px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; margin: 5px; transition: 0.2s; }
        .btn-correct { background: #2ecc71; color: white; }
        .btn-wrong { background: #e74c3c; color: white; }
        .btn-next { background: #3498db; color: white; }
        .btn-thinking { background: #f1c40f; color: black; }
        .btn-join { background: #eee; color: #333; font-size: 12px; padding: 5px 10px; }

        /* 管理者参加用ボタン（コンパクト版） */
        .admin-buzz-zone { margin-top: 20px; padding-top: 20px; border-top: 2px dashed #ccc; }
        .push-btn-small { width: 120px; height: 120px; border-radius: 50%; background: #000; color: white; font-weight: bold; border: 5px solid #eee; cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent; }
        .push-btn-small:active { transform: scale(0.95); background: #333; }
        .push-btn-small:disabled { background: #ccc; cursor: not-allowed; }

        #rankingList { text-align: left; background: #fff; border: 1px solid #ddd; padding: 10px; border-radius: 6px; }
        .rank-item { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .invite-url { background: #eee; padding: 10px; font-size: 14px; word-break: break-all; border-radius: 4px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Hayabo Admin</div>
        
        <div class="invite-url">
            招待URL: <span id="urlText">---</span>
            <button onclick="copyUrl()" style="margin-left:10px; font-size:12px;">コピー</button>
        </div>

        <div class="control-group">
            <button class="btn btn-correct" onclick="sendCorrect()">正解 ⭕️</button>
            <button class="btn btn-wrong" onclick="sendWrong()">不正解 ❌</button>
            <br>
            <button class="btn btn-thinking" onclick="sendThinking()">シンキングタイム 🎵</button>
            <button class="btn btn-next" onclick="sendReset()">次の問題へ ⏩</button>
        </div>

        <div id="adminJoinZone">
            <button class="btn btn-join" id="showJoinBtn" onclick="toggleJoinForm()">管理者も参加する</button>
            <div id="joinForm" style="display:none; margin-top:10px;">
                <input type="text" id="adminNameInput" placeholder="管理者の名前" style="padding:8px; border-radius:4px; border:1px solid #ccc;">
                <button class="btn" style="background:#000; color:#white; font-size:12px; padding:8px;" onclick="adminRegister()">登録</button>
            </div>
        </div>

        <div class="admin-buzz-zone" id="adminBuzzZone" style="display:none;">
            <p style="font-size:12px; color:#666; margin-bottom:5px;">あなたのボタン</p>
            <button id="adminBuzzBtn" class="push-btn-small">PUSH</button>
            <p id="adminStatus" style="font-weight:bold; margin-top:5px;"></p>
        </div>

        <h3>RANKING / 順番待ち</h3>
        <div id="rankingList">---</div>
    </div>

    <audio id="snd_buzz" src="https://otologic.jp/free/se/quiz01.mp3"></audio>
    <audio id="snd_correct" src="https://otologic.jp/free/se/quiz-bell01.mp3"></audio>
    <audio id="snd_wrong" src="https://otologic.jp/free/se/quiz-wrong01.mp3"></audio>
    <audio id="snd_thinking" src="https://otologic.jp/free/se/quiz-thinking01.mp3"></audio>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room');
        const adminKey = urlParams.get('key');
        
        document.getElementById('urlText').textContent = `${window.location.origin}/?room=${roomId}`;

        socket.emit('admin-join', { roomId, adminKey });

        // 音声再生
        socket.on('play-sound', (type) => {
            const audio = document.getElementById(`snd_${type}`);
            if (audio) { audio.currentTime = 0; audio.play(); }
        });

        // ボタン送信関数
        function sendCorrect() { socket.emit('admin-correct'); }
        function sendWrong() { socket.emit('wrong'); }
        function sendThinking() { socket.emit('admin-play-thinking'); }
        function sendReset() { socket.emit('reset'); }

        function copyUrl() {
            const url = document.getElementById('urlText').textContent;
            navigator.clipboard.writeText(url).then(() => alert('コピーしました'));
        }

        // 管理者参加ロジック
        let adminName = '';
        function toggleJoinForm() {
            document.getElementById('joinForm').style.display = 'block';
            document.getElementById('showJoinBtn').style.display = 'none';
        }

        function adminRegister() {
            const name = document.getElementById('adminNameInput').value;
            if(!name) return;
            // まずユーザーとしてサーバーに登録
            socket.emit('admin-register-user', { username: name });
            // その後ログイン
            socket.emit('login', { roomId: roomId, username: name });
            adminName = name;
            document.getElementById('joinForm').style.display = 'none';
            document.getElementById('adminBuzzZone').style.display = 'block';
        }

        const adminBuzzBtn = document.getElementById('adminBuzzBtn');
        adminBuzzBtn.addEventListener('click', () => {
            socket.emit('buzz');
        });

        socket.on('update', (data) => {
            const list = document.getElementById('rankingList');
            list.innerHTML = '';
            data.buzzList.forEach((u, i) => {
                const div = document.createElement('div');
                div.className = 'rank-item';
                div.innerHTML = `<span>${i+1}. ${u.name}</span> <span>${u.timeDiff}s</span>`;
                list.appendChild(div);
            });

            // 自分の状態更新
            const adminStatus = document.getElementById('adminStatus');
            const isMeBuzzed = data.buzzList.some(u => u.name === adminName);
            if(isMeBuzzed) {
                adminStatus.textContent = "WAITING...";
                adminStatus.style.color = "#3498db";
                adminBuzzBtn.disabled = true;
            } else {
                adminStatus.textContent = data.isLocked ? "LOCKED" : "READY";
                adminStatus.style.color = data.isLocked ? "#999" : "#2ecc71";
                adminBuzzBtn.disabled = data.isLocked;
            }
        });

        socket.on('celebrate', (winner) => {
            if (winner.name === adminName) {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }
        });
    </script>
</body>
</html>
